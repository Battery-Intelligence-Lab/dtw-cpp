name: Python wheels

on:
  push:
    branches: [develop]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build_wheels:
    name: Wheels on ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - uses: pypa/cibuildwheel@v2.21
        env:
          CIBW_BUILD: "cp39-* cp310-* cp311-* cp312-* cp313-* cp314-*"
          CIBW_SKIP: "*-musllinux_* *-win32 *-manylinux_i686"
          CIBW_ARCHS_MACOS: "x86_64 arm64"

          # Release build, no tests/benchmarks, no heavy solvers
          CIBW_CONFIG_SETTINGS: >-
            cmake.args=-DDTWC_BUILD_PYTHON=ON
            cmake.args=-DDTWC_ENABLE_GUROBI=OFF
            cmake.args=-DDTWC_ENABLE_HIGHS=OFF
            cmake.args=-DDTWC_BUILD_TESTING=OFF
            cmake.args=-DDTWC_BUILD_BENCHMARK=OFF
            cmake.args=-DCMAKE_BUILD_TYPE=Release

          # macOS: 10.15+ for std::filesystem, OpenMP
          CIBW_ENVIRONMENT_MACOS: >-
            MACOSX_DEPLOYMENT_TARGET=10.15
          CIBW_BEFORE_BUILD_MACOS: "brew install libomp || true"
          CIBW_BUILD_VERBOSITY: 1

      - uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  build_sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - uses: astral-sh/setup-uv@v6

      - run: uv build --sdist

      - uses: actions/upload-artifact@v7
        with:
          name: sdist
          path: dist/*.tar.gz

  # Upload to Test PyPI on every tag push (for verification)
  publish-test:
    name: Publish to Test PyPI
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    environment: test-pypi
    permissions:
      id-token: write  # Required for OIDC trusted publishing
    steps:
      - uses: astral-sh/setup-uv@v6

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - run: uv publish --publish-url https://test.pypi.org/legacy/ dist/*

  # Upload to PyPI on release tags only
  publish:
    name: Publish to PyPI
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build_wheels, build_sdist, publish-test]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # Required for OIDC trusted publishing
    steps:
      - uses: astral-sh/setup-uv@v6

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - run: uv publish dist/*
