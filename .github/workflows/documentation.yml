name: Build, test and generate docs
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout current branch
        uses: actions/checkout@v6

      # --- Prepare contributing docs (copy from repo root into Hugo content) ---
      - name: Prepare contributing docs
        run: |
          mkdir -p docs/content/contributing

          # CONTRIBUTING.md -> guideline.md (with Hugo frontmatter)
          {
            echo '---'
            echo 'title: Guideline'
            echo 'weight: 2'
            echo '---'
            echo ''
            # Strip any existing Jekyll frontmatter (between --- markers)
            sed '1{/^---$/!b};1,/^---$/d' ./CONTRIBUTING.md
          } > docs/content/contributing/guideline.md

          # conventions.md
          {
            echo '---'
            echo 'title: Coding conventions'
            echo 'weight: 3'
            echo '---'
            echo ''
            sed '1{/^---$/!b};1,/^---$/d' ./develop/conventions.md
          } > docs/content/contributing/conventions.md

          # contributors.md
          {
            echo '---'
            echo 'title: Contributors'
            echo 'weight: 4'
            echo '---'
            echo ''
            sed '1{/^---$/!b};1,/^---$/d' ./develop/contributors.md
          } > docs/content/contributing/contributors.md

          # Fix internal links (strip develop/ prefix)
          find docs/content/contributing/ -name '*.md' -exec sed -i 's|](develop/|](|g' {} +

      # --- Hugo build ---
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build Hugo site
        working-directory: docs
        run: |
          hugo mod get -u
          hugo --minify --baseURL "https://battery-intelligence-lab.github.io/dtw-cpp/"

      - name: Build Pagefind search index
        working-directory: docs
        run: npx pagefind@1.3.0 --site public --output-subdir _pagefind

      # --- Doxygen API reference ---
      - run: mkdir -p build
      - name: Create Doxygen Files
        uses: mattnotmitt/doxygen-action@v1.12.0
        with:
          doxyfile-path: 'docs/Doxyfile'
      - run: sed -ri 's/<div id="projectname">(.*)/<div id="projectname"><a href="..\/index.html">\1 <\/a>/g' ./build/Doxygen/html/index.html
      - run: mv ./build/Doxygen/html ./docs/public/Doxygen
      - run: cp -r ./media ./docs/public/Doxygen

      # --- C++ build, test, and coverage report ---
      - name: Install compiler and dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc-13 g++-13 lcov

      - name: CMake configure
        run: cmake -B build_dir -DCMAKE_BUILD_TYPE=Debug -DDTWC_ENABLE_COVERAGE:BOOL=TRUE -DDTWC_BUILD_TESTING=ON
        env:
          CC: gcc-13
          CXX: g++-13

      - name: CMake build
        run: cmake --build build_dir --parallel 2

      - name: Run tests
        run: ctest -j2 -C Debug --output-on-failure
        working-directory: build_dir

      - name: Upload coverage to Codecov
        run: |
          lcov --directory ./tests --capture --output-file coverage.info
          lcov --remove coverage.info '*/tests/*' '/_deps/*' '/usr/*' '*/catch2/*' --output-file coverage.info
          lcov --list coverage.info
          bash <(curl https://codecov.io/bash) -f coverage.info
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        working-directory: build_dir

      - name: Generate LCOV HTML report
        run: genhtml coverage.info -o Coverage
        working-directory: build_dir

      - run: mv ./build_dir/Coverage ./docs/public/Coverage

      # --- Upload combined site artifact ---
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4

  # Publication job
  publish:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
